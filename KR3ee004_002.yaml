谷全憑瀉內投復溜穴處專用補內庭提刮瀉中求瓊瑤七星針二百七十四法項強頭疼痛不禁試針須使後溪尋背中臂膀肩中痛中渚如針真萬金腹與夾臍疼不休陰陵穴中水無憂痃癖胃寒留三里胸中疼痛大陵求兩脅陽陵痛更悠腰膝疼痛委中瘳世上黃金容易得七般針法少人收瓊瑤辨證二百七十五法觀色察形證何經病所侵用針明補瀉得穴辨浮沉上下之順逆四時寒熱針醫人如會此一刺真千金又曰二百七十六法榮衛不通萬病侵百般疼痛肚中生大小風疼在四梢千般瘡髓在皮侵若用醫工玄妙法除是飛騰水火針一針五臟都針遍通身疼痛一針攻針針調陽補陰經春刺淺兮秋刺深安詳仔細用心尋迎隨補瀉知逆順得效針候定浮沉萬萬逞價值千金一穴能分鬼神哭邪神豈敢更來侵雖不醫枯骨還魂金針到處時見寧十代明醫留針賦凡夫遵古顯神功刺病奇書二百七十七法昨獨三更日正午泥里推車蕩塵土有人會得此般語五五都來二十五又曰二百七十八法六天如意妙幽玄祕密提搓最為先迎隨自然調榮衛飛騰妙刺聖人傳上下交經分左右一二三四是根源在五常人會如此神仙妙訣莫輕言砭門祕訣二百七十九法補法推用手雙指順撩下也三次亦謂之濟審用手探其針皮外緊即用納法也迫用大指順針泊潦也三次納如氣不至用雙指將針輕納動三次使其氣至補也瀉法旋緊即用法也刮用手次指按針頭用大指甲刮上也三次揭用手雙音滅機上也三次亦謂之瀉剝用雙手指提針頭提上三次使其氣至也瀉也又曰男瀉大指向內男補大指向前女瀉大指向前女補大指向內歌曰二百八十法子午流注號飛騰十二穴中取功能刺病療病無不效移病住疼有神靈能調五臟諸病疾善治三焦氣血行添涼除熱減疼痛動指經通救世人男女陰陽補瀉二百八十一法世人夫婦能陰陽針法訣定陰陽行後學之人莫相疑神應飛騰取病疾若君不言真妙訣試看神針巧發機先淺後深以為補先深後淺以為瀉左捻遂呼補氣虛吸來里轉瀉心俞夫婦人相反此用諸公會此能神醫瓊瑤秋夫療鬼二百八十二法秋夫撩鬼十三穴並針三四鬼自通又針九穴左右取鬼穴自然使利身一針鬼宮人中瀉二針鬼信少商中三針商陽為鬼腹四針隱白鬼皮行五瀉崑崙為鬼足六針風池鬼項筋七砭頰車鬼腮上八針承漿鬼唇中九針上星為鬼頭十針靈道鬼心寧十一陰交會三壯十二尺澤少澤針十三鬼穴都針過猖神惡鬼永無蹤提按補瀉二百八十三法提按進搓循足補退動提刮是為瀉急提瀉刮冷水冰急按搓盤如火熱若瀉先吸後呼取先呼後吸補之說先深後淺瀉中用春夏亦然真妙訣先淺後深實是補秋冬依此從其特若氣行行麻者知血行痛者針妙絶氣上上行何所知上刮七遍戰七揭氣下依然要取下七刮七戰氣下泄補之大指向前推瀉之大指向後撤若進向里捻如然若退向外捻方得瓊瑤神書無價寶誓祝非傳子孫滅三陽三陰配合上足臟下手腑氣血多少補瀉循提二百八十四法太陽膀胱並小腸少氣多循補補良多血多氣提循瀉陽明胃脘大腸旁血少氣多循補刮少陽膽至三焦鄉少血多氣補循提太陰脾臟肺經藏血少氣多下刮戰少陰腎臟手心堂厥陰肝臟心包絡氣少血多瀉補昌上足下手依經取提循氣血內中詳瓊瑤誓願莫輕泄簇壽遭刑命難當瓊瑤真人汗吐下三法汗法二百八十五法先取復溜二穴太衝二穴外關二穴先用氣上一次搓數十次補七次又搓數十次又補三次汗微出極重搓數十次又用氣上一次重按停呼五度大搓數十次又用復溜氣下重按一次汗出不止用合谷二穴收半上按三提三刮七止復溜氣上重納按刮補收汗效如神以此為妙更有些些活法不可細推窮頭一次用呼吸三十度二次用呼吸二十五度吐法二百八十六法先取曲池二穴內關二穴先用氣上一穴補三次順搖搖十七次循三次用搓數次氣上一次橫搖血逆逆橫搖多循循七七遭莫相重納按停二次略使氣下將針向外攝血氣錯亂右循七七遭停呼三次方可氣下氣下多刮搓按戰可用調勻又氣上一次停呼氣下一次右循七次按三次出針一次三十度二次五十度三次二十五度留五度下法二百八十七法先取三里二穴內庭二穴照海二穴用氣上一次就循三次下刮七次重戰提七次補三次補提三次加搓二三十次有熱方可發機後用提氣下一次復提攝氣上一次又復氣上二次連氣下三次重搓數十餘次彈數次此針自出如針不出又氣上一次搓數次循起三次連使氣下二次即下其效如神一次十六度停至三十度補瀉再用三十度內庭多彈男左女右出血男子左足出血女子右足出血如此之法盤盤丹穴法二百八十八法先循五次七次針不動如龍尾氣血不虛不實可用三次升陽三次升陰可用大盤二次下攝數遭可與伸提三次四方皆攝四次可取下順搖三次橫搖四次連下攝七次彈七次瀉三次四次出針午間針未時下下不止可用安胃散三帖搖搖氣逆搖搖逆橫橫血逆橫橫逆若用氣上氣下將針搖逆搖向外旁攝多刮逆陰逆陽可循環取下法順搖三次橫搖四次連下攝下沉沉彈七次三四次瀉七次午間下針未時下下不止安胃散治之不是神仙真妙手多刮多搓用調勻瓊瑤真人問男女針法虛循問答二百八十九法問曰何為虛循買氣不來循七次再循七次不來何也答曰又復循七次氣不來者病乃不治死也男女針法實循問答二百九十法問曰用實不用循何為實答曰補三次即緊是為實一補即緊是為邪氣令病人口閉氣醫人即將金針向左右搜至十次搓數次松者亦可使氣上使氣下
