body:
  text: 卷二瓊瑤神書地部男子筋骨疼痛七十八法男子筋骨多疼痛先取汗法要升陽升陽已了停呼足多要補七在搓方搓摩在取氣上法後在升陽一理強再加刮戰三按補連後出針病自康婦人筋骨疼痛七十九法婦人筋骨有多般先取升陰氣上衝停呼三十有餘度再取汗法血氣通汗出補三瀉四五針出伸提有大功再加搓提陽出外骨中邪氣自然空婦人嘔吐大便不通二證八十法婦人嘔吐不能止中極圓盤陽在中氣海一穴升陽上脘內關盤攝響攻若是響聲五七至即將嘔吐正心胸三里照海施下法大小便通即便通婦人胎衣不下連小腹疼痛八十一法胎衣不下連腹疼三陰升陽一二回再用氣上上二穴連下升陰急去催三里調胃氣上法再取氣上氣自開足冷微微出些汗搓搓便戰出針來婦人白濁日夜不止八十二法婦人白濁日夜流滿身黃瘦百勞憂白濁子宮中極用雙盤雙穴在手頭中極圓盤多取熱子宮雙用理中收三里三陰雙陰上雙穴升陰血氣周婦人生胎八十三法下胎此法要升陽再用升陽補更涼復取氣下三搓法即用升陰産便康婦人下死胎八十四法死胎多用升陽法連用氣上搓數遭再用升陽加搓法復取氣下升陰變升陽加補微微下急用升陽痛即消腹下升陽一二次死胎急下見功高婦人腹上下胎八十五法橫橫順逆要升陰再用升陰四逆陽再加搓攝五七次伸提自出如神匡婦人赤白帶下八十六法婦人赤白大盤取圓圓盤盤呼吸停若盤攝白不能止中極皮起五分真五分提搓針不出三陰升陽病者欣三陰復使氣上法搓搓連下升陰行婦人血山崩八十七法婦人血山崩漏多中極大盤要搓摩再搜搜來十數次雙盤二穴要精和雙雙盤後圓圓取若是血山即要止陽升升後定無訛婦人腳下筋骨疼痛八十八法婦人疼痛血不調陽陵陽交上下交太衝取血多為妙陽陵升陽氣下消陽交升陰調勻法足冷搓搓熱戰交婦人血氣多為弱急急升陽補血饒婦人脹滿兩足浮腫八十九法滿腹氣脹足浮腫中脘下盤攝在分丹田盤下攝數次皮腹七分響一勻再加三里氣上二一次氣下又陰升三陰太衝取血法運用調勻針出騰婦人腳氣紅腫疼痛九十法婦人腳氣紅腫痛應痛多針出血行三陰引氣上下法二循血出太衝迎再加次日復針刺湧泉彈流自依經停呼度數五十次不用出針氣自寧婦人經血不調九十一法婦人經氣血不調中脘圓盤氣上交精宮雙盤盤攝下二穴搓搓熱氣饒再加三氣上法三陰攝下血氣調調調胃三里升陽一急出針頭氣下消婦人經事不行九十二法多搖血氣即便行提戰皮起自分明便加一盤用七攝中提不動下即虛婦人下經事九十三法經事不行一二載中極大盤攝不行再攝大盤一二次攝下搓搓要熱生腹中熱熱三陰下伸提皮起七分明七分皮起直奇下三陰升陰氣下頻室女調經九十四法室女大盤用四循二穴微提陽自行再加微循用搓法攝下搓搓要熱生若是響法升陰二上穴升陽響數聲此病伸提針不出不問經候即時行婦人經氣不行九十五法經事不調月不行中極大盤用提伸若是響法攝七次伸提皮起自然真再取小盤加攝法搓搓要熱一小循又加伸提提不起經後七七自然行婦人赤白帶下黃瘦潮熱九十六法婦人赤白下愈多子宮虛冷奈渠何中極圓盤取下氣精宮雙盤搓熱過三里三陰升陽法連取升陽取調和次日又行三陰交連取升陰取調和婦人血山崩日夜流多不止九十七法婦人血山崩甚多老者難醫病若何一日中極圓盤取精宮雙盤要氣和過往七日針三里三里升陽按戰摩若是腰疼腎俞取搓搓急按數刮多男子腎虛夢泄並夜出盜汗九十八法男子夢泄夜不一精宮兩盤法最良丹田一穴圓盤取三陰一穴有升陽若是諸穴伸提起提起七分腎氣強三里二穴氣上法連提皮起實良方男女腳膝紅腫流注氣血疼痛九十九法腳膝上下流注痛睨日屬陰病可憐應痛此穴多刮戰正穴施法應上先若是好偏提搓補病偏正補奇疴痊在後出針多戰按彈彈出血邪氣遷婦人五心發熱月水淋漓一百法五心潮熱漸相侵申酉陰陰熱自法先刺勞宮提出血湧泉升陽氣至心若人四穴針出大來日中極圓盤針圓盤一次停呼數重攝伸提血氣沉男子腳氣腫痛一百一法男子腳氣沒沒痛禁灸多針亦不妨二陽二穴氣上下太衝二穴取血良湧泉彈刮祛邪法刮戰二穴崑崙訣再加公孫微血出諸穴調勻此穴強男子渾身筋骨疼痛一百二法男子筋骨疼痛多醫人功取血相和手法宜用搓提起氣上升陽病可呵急取停呼五十度後用戰搓熱自過是用足合取熱法此病一七自消磨男子五心潮熱一百三法男子五心發熱來百勞五壯戰提催內關二穴宜氣下三里氣下升陰回再用停呼三十度後取百勞刮戰開三里調勻急下取諸穴伸提一例推男子大小腹痛或兩脅背痛一百四法小腹急走大腹痛兩脅背上痛難行小腹丹田圓盤取大腹中脘攝還迎兩脅追里圓盤七背痛肩井委中行肩井伸提戰皮起三里氣下要分明男子心痛噎食難進一百五法男子心頭痛相煎噎食難進氣束束上脘下盤攝七七內關升陽氣上喘三里氣上按上脘即取下法痛安痊次日再針太衝穴連用出血妙中立男子氣上喘下手足冷一百六法男子上喘氣難當三里升陰氣下忙再用三陰升陰法用法下痰氣自康男女大便虛祕不通一百七法大便虛閉不能通內庭照海一里攻即使下法時刻下多取調勻在手中男子肚腹下一百八法補七停呼三十度便取升陽腹內行升陽即去腹內熱又用氣上向前升針腹中響三呵三口呵呵吸罷涼生清涼陽氣來臍下氣下升陰病即輕婦人肚腹下一百九法瀉五停呼五十七醫下七數要升陽升陽二次氣上去三吸三呼呵二方婦人此病多陰數急取氣上是為涼陰上有三四下七下升陰即便安康男女鼻瀉不聞香臭一百十法鼻瀉之症鼻多般神庭穴內戰提痊迎香二穴升陰法二氣開通提搓連三里二穴升陽一後取升陽氣下偏次日又針三里下三陰穴內氣下先男女口氣腥臭一百十一法口氣腥臭熱可增口中刺上用金津心經此穴多氣下腎經穴內停氣勻男女兩眼不開一百十二法不開兩眼最難熬睛上伸提血漸消眼珠脹痛合谷下三里升陰一二遭再加太衝出血法三里氣下要針滯若是太衝出毒血取開時刻見青霄男女眼目紅腫疼痛一百十三法眼目紅腫取血出再取出血要搓摩太陽出血真奇妙三里升陽氣下和再取骨空多提瀉合宜即下要取搓攢竹多提補三次諸穴上下病安多男女大便虛閉不通一百十四法氣虛不通下氣攻三里照海氣下通若是氣響升陰下速用氣上取調中過後三日針中脘圓盤七攝氣海空三里再針取氣下內庭取血便除蹤男女九種心痛連脾痛不止一百十五法九種心疼連脾痛上脘盤盤拘在中氣海圓盤在上法關元雙盤響功取大陵便取升陽法三里升陽氣下通諸針都要取熱氣此針皮起見良工男女眉間疼痛目昏一百十六法眉間疼痛搓摩起攢竹伸提又即提若是目昏升陽取二證升陽升陽奇升陽使後取血法伸提皮起停呼宜印堂伸提搓多補合谷升陽痛即宜男女腹上腹下一百十七法順搖二三多提搖好按橫搖四宜和加搓提攝五七次搜戰提起用搖摩問病腹脹大便急針上沉浮開氣搓若緊不動要提按順搖數十下調和男女腹部盤盤即響一百十八法連提加戰在時法丹穴微循攝自行重攝即響重用按便氣周流病自輕男女下小水一百十九法要下小水用丹田三陰升陽氣下痊再加丹田大盤攝三陰二穴升陰先升陰復取氣下法小水胞中脹自生若脹小水升提起連下小水即自行男女忽然失音一百二十法忽然失音便生陽即便氣上又生陽肺中氣實多刮取連用氣下再刺良復取三里生陽法氣下升陰補即多再取少商出毒血不怕失音病不和男女耳聾一百二十一法耳中委中升陽法又取氣上到耳中若是蟬鳴聽會取搓搓彈彈氣下攻三里氣上調勻到翳風二穴有神通委中氣下升陰法耳中如法自然空男女滿腹走氣疼不止一百二十二法腹中走氣十分疼中脘圓盤搓在針氣海升陽中脘上搓搓加用在心中二次中脘攝盤下氣海升陽響數聲三里照海取下法走氣即除在針明男女取血一百二十三法取血三按有三補再補三遭七彈禁即明出血再三補連彈七次急出針若是虛人莫出血實人出血有神欽陰人氣下莫取血彈取此血絶此陰男女腰疼腿硬一百二十四法腰疼腿硬急升陽委中升陽再升陽升陽三次停呼至後用搓搓取熱康委中取血多為妙再取升陰搓急彈若有虛人忌取血實人取血痛即安男女手背紅腫疼痛一百二十五法手背紅腫速升陽液門出血補按詳氣上升陽氣使下通理搓摩氣自揚若是氣足用三補急彈三次出針強若還紅腫消不盡升陰重提瀉更良男女牙齒疼痛翻胃一百二十六法牙齒陳陳疼相煎呂細升陽出血停再取三里升陽法翻胃吐食別理行中脘圓盤一七次氣海升陽在書中再取氣海下攝法三盤九搓出針中男女喉中乳蛾一百二十七法乳蛾之證少商知出血急用即施宜假若外關氣不至三里升陽便自為再取十指都出血病效安危在用機復取太衝並二穴出血不改死不醫男女手足之證一百二十八法手足之證有多般氣上升陽在外關曲池外關氣上法急取搓搓助陽還陽陵氣上升陽法氣上升陰頃刻間若用出針搓摩起皮起三分即笑頻男女百節疼痛一百二十九法升陽不過二節邊一節升陽按戰連氣上升陽節節有更連搓搓百節牽男女百節止痛一百三十法升陽二次氣通連急取出血如井泉假令不取血出法逆令病者實難痊男女哮喘一百三十一法哮喘之證要升陽內外升陽病即康天突膻中專要瀉三里升陽氣下良若要哮喘即便止氣來戰刮即升陰再用升陰一二次戰戰急按要出針男女腹部大盤一百三十二法大盤九法用十循二穴伸提揚自行再循七次如搓法上穴升陽下穴停若是響法升陽攝下穴升陽響數聲諸病仂提提不出再取加搓效如神男女腹部小盤一百三十三法先循二七一十四中用盤盤盤七遭拘住此法等氣海氣海七盤七攝高男女積聚一百三十四法腹中痞氣一難同先取大盤四十攻四邊加攝搓摩法中脘升陽氣海窮在加中脘升陰下氣海升陽響自通若要除疾伸提好三搖去疾針自松男女腹中雙穴一百三十五法腹上雙穴一難取先取左邊向左循若將右邊右邊起拘住此氣中心停伸提皮起加攝法取用盤盤一此回再要除疾取響動提且搓搓去氣行男女大便閉塞一百三十六法大便閉塞不能通氣上支溝陽有功三里氣行通照海升陽搓後用搓松里松皮葉針頭住脹自消兮腹自空若要安即伸提起縱他實硬自然通男女小腹脹滿一百三十七法小腹脹滿須下氣百聲氣下自然松內庭大氣通三里左右橫流針有功若利丹田大盤拆十回連攝小便通更添脹硬何由所即不停針自不同男女七疝一百三十八法七疝偏疼取大敦大敦出血用彈針曲骨大盤不用攝三陰升陽氣上行再取氣上即使下關元氣海用盤明申脈微使上氣法連屈氣下病安寧男女渾身及筋骨疼痛一百三十九法渾身疼痛要升陽氣上提搓仔細詳若筋疼痛宜汗法膏肓多灸莫針良復計三里行間穴二穴升陽氣上忙再使三陰令氣下一時二證即安康男女手心勞宮發熱一百四十法勞宮二穴治心風手中發熱氣下攻大陵升陽復氣下三里升陰氣下通膻中灸五瀉用七疼痛心間呼吸中呼吸三十出針補一時二證見神功男女有病邊汗