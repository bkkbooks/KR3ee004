body:
  text: 卷四附方穴圖十四經穴歌一手太陰肺經中府雲門天府列俠白孔最尺澤穴列缺經渠太淵好魚際少商如韭葉手陽明大腸經手於陽明起商陽二間三間合谷藏陽谿偏歷連溫溜下廉上廉三里長曲池肘髎隨五里臂臑肩髃巨谷常天鼎扶突禾髎接終於迎香二十行手太陽小腸經肩俞天宗及秉風曲垣肩外復肩中天窗天容上顴髎卻入耳邊尋聽宮支正少海肩貞走腕骨陽谷可養老少澤前谷後谿隅太陽穴一十九手少陰心經九穴極泉及少衝青靈少海少府尋通里陰郄卻靈道心經穴法在神門足厥陰肝經足厥大敦行間穴太衝中封蠡溝列中都膝關至曲泉陰包五里陰廉切羊午章門近期門復始太陰雲門接老師便使神針法病人良心久中悅足少陽膽經少陽足重瞳子髎四十三穴行迢迢聽會客主頷厭集懸顱懸釐曲鬢翹率谷天衝浮白次竅陰完骨本神僚陽白臨泣開目窗正營承靈及腦條風池肩井淵液液輒筋日月京門好帶脈五樞維道續居髎環跳下中瀆陽關陽陵復陽交外丘光明陽輔高膽經血穴通如此足太陰脾經隱白大指端內側爪角宛宛如韭葉本節後陷為大都核骨下中尋太白公孫節後一寸關商丘踝下微前安三陰交上踝三寸骨外陷中仔細看更上三寸太陰絡一名陷骨須審約膝下五寸尋地機陰陵泉穴宜斟酌血海三寸上膝髕內廉之際白肉分魚腹上越起觔處腹內動脈為箕門足少陰腎經湧泉起足少陰腎屈足卷指中心定然谷針上內踝前大骨陷中宜陽立太谿踝旁跟有脈大鐘跟後曲中拘水泉溪踝下一寸踝下即是照海穴復溜二寸踝上參交信後廉以筋骨腨分六寸尋築賓陰足脈內取來難輔骨之下大筋下小觔之上屈脈安足陽明胃經罕有五穴足陽明承泣四白巨髎經地倉大迎頰車峙下關頭維人迎對水突氣舍連缺盆氣戶庫房屋翳迎膺窗乳中延乳根不容承滿梁門分關門太乙滑肉門天樞外陵大巨存水道歸來沖次髀伏兔陰市走梁丘犢鼻足下三里上上廉條口下廉逢豐隆解谿衝陽足陷谷終從厲內庭足太陽膀胱經足穴太陽六十二睛明攢竹參差參五處承光上通天絡卻玉枕天柱畢大杼風門引肺俞厥俞心俞膈俞住膽俞肝俞脾俞通胃俞三焦腎俞中大腸小腸膀胱俞中膂白環兩俞輸自從大杼白環去脊中三尺肩上髎次髎中復下會陽承扶殷門至浮郄委陽委中罅膊內挾脊附分當太陽行皆第二行魄戶膏兮神堂譩譆路膈關魂門旁陽綱胃倉肓門意舍至胞肓並行下秩邊藏舍周已合陽昱承筋承山居其次飛陽跗陽至崑崙僕參申脈連金門京骨束骨入通谷小指外側至陰會手厥陰心包經九穴厥陰天池會天泉曲澤都無異郄門間使內關停大陵勞宮中衝備手少陽三焦經二十三穴手少陽關衝液門中渚旁陽池外關支溝會會宗三陽四瀆配天井穴合清冷淵消濼臑會肩髎偏天髎天牖同翳風瘈脈顱息角孫通耳門禾髎絲竹空任脈經任脈經兮三起於陰會上曲骨中極關元石門氣海接陰交神闕水分立下脘建里循中脘上脘巨闕起鳩尾中庭膻中帶玉堂紫宮又行華蓋處璇璣天突廉泉冷上頤還以承漿起督脈經督脈皆行二十七穴始長強接腰俞陽關命門當懸樞脊中筋束行陽至靈臺神道長身柱陶道大椎俞啞會風府腦戶連強間後頂百會前頂會上星神庭到素髎水溝兌端齦交住十四經穴歌二手太陰肺經為君試舉手太陰少商手指細端尋魚際大指本節後太淵出掌後中心經渠寸口陷中是列缺腕上半寸針孔最腕上量七寸尺澤肘中約文論俠白出在天府下去肘五寸動脈應天府腋下凡三寸刺衄不止功可勝手陽明大腸經手陽明經屬大腸食指內側名商陽本節前有二間穴本節後有三間當歧骨陷中尋合谷陽谿腕中上側詳腕後三寸是偏歷五六寸間側溫溜曲肘曲中求曲池池上三寸三里有上廉里下側一寸廉此下一寸灸肘肘髎大骨外廉上五里肘下三寸取臂臑肘上一寸量肩髎之下穴當別手少陰心經小指內廉名中衝少府節後直營宮腕後一寸名通里陰郄掌後為液中神門掌後銳骨端掌後半寸靈道通少海肘內節後是青靈肘上三寸容更有極泉凡二穴腋下筋脈貫入胸手太陽小腸經小指為端手少澤前谷外側節前穴節後陷中為後谿腕骨陷中尋外側銳骨之間陽谷討踝骨去陷為養老支正腕後量五寸少海肘端五分巧足厥陰肝經大敦拇指看毛聚行間指間動脈處節後寸半或二寸太衝有脈誠堪據中封一寸內踝前蠡溝踝上五寸專踝上七寸名中都膝關鼻下二寸余曲泉膝內輔骨下大筋上下索筋罅陰包四寸膝以上內廉筋間索其當五里三寸氣下衝有脈有動陰股中羊失之下曰陰廉氣衝相去二寸通足少陽膽經小指次指膽所起竅陰去爪韭菜是歧骨節前名俠谿地五會兮一寸是俠谿寸半至臨泣丘墟踝下如前此懸鐘踝上三寸收陽輔四寸踝上頭五寸光明穴更有七寸名外丘陽交針取對一寸膝外二寸陽陵又陽關腋上三寸是中瀆外膝五寸翳風中垂手點到指盡處環跳側取細參是足太陰脾經二十一穴太陰脾隱白大都太白隨公孫商丘三陰交漏谷地機陰陵拗血海箕門爵門衝開府舍腹結大橫排胸鄉周榮大包隨足少陰腎經足穴少陰二十七湧泉然骨太谿益大鐘照海通水泉復溜交信築賓連陰谷橫骨大赫亦氣穴四滿中注立肓俞商曲石關蹲陰都通谷幽門僻步廊神封接靈墟神藏彧中俞府推足陽明胃經陽明並穴起厲兌大次指端應屬胃上指外間是內庭節後三寸陷谷位此是三寸或二寸衝陽動脈還相應解谿更後寸半中踝上八寸豐隆正三里膝下三寸強上巨虛下三寸量下巨虛兮三分取中折寸半條口當膝臏之下有犢鼻膝上二寸梁丘的陰市三伏伏兔穴髀關兔後思分中膝眼四穴又不同膝頭骨下兩旁取陷中仔細尋其宗足太陽膀胱經至陰為足膀胱井小指外側韭葉定通谷節前束骨後大骨之下京骨應申脈踝下客爪甲金門踝下毋相雜僕參跟骨之下尋踝後經上外崑崙跗陽踝下三寸正飛陽九寸或七寸承山腨腸分兩道承筋腨中針切禁約文之下尋合陽二寸上按委中當郄有承扶二穴遠虎臂下股橫紋決更有五寸浮郄接二寸都是殷門穴更有二穴近委陽三焦下甫均須別手厥陰心包絡經中衝穴出中指端屈指勞宮取掌間大陵掌後筋間使去腕二寸尋內關郄門去腕上五寸間使二寸兩筋間內廉陷中看曲澤天泉腋下二寸間手少陽三焦經關衝名指外端論小次指間名液門中渚次指中節後陽池表腕有穴寸腕後二寸外關絡支溝腕上三寸約會宗三寸空中求消息一寸毋會錯支溝上寸背大脈此是三陽絡斷穴四瀆肘前大骨外天井曲肘後尋側清冷淵肘上三寸消濼肩下臂外索不傳異穴後谿小指小腸經內關田裡厥陰心列缺肺經天澤下三焦穴道外關家不傳異穴公孫一穴大指後腎經穴道照海就獨有臨泣屬膽經申脈膀胱腳下透不傳督脈八穴自從督脈取陶道微穴由頂始三節身柱神道上命門陽關腰眼裡惟有腰俞上陽關長強俞下急急取穴道分寸歌括嘗聞穴道在乎分寸之間取法周身之法編成歌括心玩意會八法穴道內關掌後取二寸兩筋底取穴陷中央直透外關使公孫足大指內側節後取一寸陷之中坐蜷兩足底外關手腕中骨後二寸處針透內關前兩取施妙濟臨泣足小指次指在其旁本節後俠谿寸半穴中藏列缺腕骨側兩手兩交叉中指頭盡處沒皮半寸加照海在內踝二寸下肉間橫針寸五分補瀉有後先申脈外踝下陷中內際邊五分針取用直刺照心間後谿手小指外側節五分捻拳紋尖上一寸透掌心天星十一穴三里在膝下三寸外廉間舉足兩筋取針行寸半安內庭足二指陷中刺三分腹痛單用瀉虛冷補相當曲池肘骨中屈肘縫尖是手拱向胸前使針二寸住合谷手大指次指歧骨間虎口內一寸刺入一寸看委中足後腕脈應在紋中取穴要端詳二寸半處明承山足後踝上去八寸分足腨腸下穴二寸五分中崑崙足外踝後跟陷中針直流呂細穴方可一寸深環跳在髀樞側取下足舒屈起上邊足深淺一寸醫陽陵膝下點一寸外廉旁偏身風不隨三分刺可詳通里兩手間起骨後一寸直使一寸深效治四肢病流注六十穴道少商大指端爪甲韭葉看沿皮向外取三分針自安魚際手大指節後散脈中一分以沿皮向後太淵通太淵掌後穴陷中取動脈刺入三分深專治氣將絕經渠寸口中二寸中相因針治諸走氣一寸刺除根尺澤肘中紋動脈手拿尋刺入一寸半醫瘳腰脅疼商陽次指側爪甲一分穴沿皮向後取三分針奇特二間手大指次指本節前內側陷中陽針刺效先賢三間手大指次指節後取第三陷中平三分真有理陽谿手腕骨上側兩筋仿五分針到穴虛溺如反掌少衝手小指內廉爪甲起角邊如韭葉三分針可矣少府手小指本節後陷中掌中煩熱症針刺取五分神門在掌後骨端針五分沿皮向前取直透腕骨中靈道手腕骨後寸五分內沿皮向前取寸半針效速少海取穴手叉腰肘骨內廉天井交旁開五分在少海右邊小海寸針高少澤小指端外側爪甲處沿皮向後取三分針內刺前谷手小指外側本節取穴在陷中間二分針中使陽谷手外側腕骨大筋間筋骨分中取針透腕骨邊中衝中指端甲爪韭葉間沿皮向後取針透魚腹間勞宮手在掌動脈是中央屈放無名指點穴正相當大陵掌後取兩筋陷中使橫紋定其穴寸半針入里間使手掌後三寸兩筋間針透支溝穴瘧疾得痊安曲澤在肘內橫紋穴上針一寸指下的禁灸免勞心關衝無名指爪甲後三分斜針取巧用補瀉在功能液門手次指捻拳按桌子沿皮外一寸針透陽池使中渚手次指本節後液門五分沿皮去二寸向後行陽池手上腕大骨節兩間針入五分灸效取十全功支溝手腕後三寸兩骨間針透間使穴脈道氣交泰天井肘間外骨後一寸在兩筋針一分瘰癧灸無賽大敦足大指爪甲一分取沿皮向後針三分刺依理行間足大指次指歧縫間動脈應其穴一寸刺相當太衝在足背折取行間對上量二寸中五分針入內中封內踝前仰足一寸邊骨尖平過昱半寸刺無偏曲泉膝內看輔骨大筋半陷脈屈中取寸半針功按竅陰足小指次指爪甲端韭葉二分刺艾火又加添俠谿足小指次指歧縫間直針取七分脹滿即時寬丘墟足外踝臨泣穴相逢二寸量到處寸半刺其功陽輔外踝上四寸輔骨半橫刺三寸深左癱右邊瘓隱白足皮經大指端中尋韭菜沿皮後針灸至三分大都足大指本節後陷中五分針可用艾灸兩相攻太白足內側骨下陷中求穴入五分針加艾氣周流商丘內踝下陷中一寸通可灸五七壯寒濕側腳風陰陵泉在膝內側轉骨前伸足取橫針透至陽陵泉厲兌大指足次指爪甲內韭葉入五分針灸方效速陷谷足大指次指之外間內庭上二寸針入一寸安衝陽在足跗上約三寸骨動脈谷陷前三寸量交足湧泉腳板心屈足宛中尋大小便閉結速取五分針然谷內踝前大骨陷中邊橫針一寸處足腫並喉咽太谿在內踝後跟骨上尋動脈陷中灸一寸透崑崙復溜內踝上二寸陷中平沿皮順骨下一寸兩相停陰谷在膝內轉骨彎大筋上面小筋取一寸要針行至陰足小指外側爪甲角沿皮後二分眼痛甚服藥通谷足小指外側前陷里橫針去三分腫痛腳氣愈束骨足小指外側本節連後至陷中點沿皮一寸前京骨足外側大骨下赤白肉際陷中看橫針五分得手三里在手曲池二寸有穴取二寸針七壯加艾灸膝關在犢鼻骨上取旁開五分處點穴橫透膝眼來懸鐘外踝骨用指按骨間四指橫按盡針透陰交邊三陰交內踝上取三寸端橫針透絕骨點穴休要偏陰市膝上面五寸垂手放中指點到穴三分灸七壯豐隆外踝上八寸下廉外五分針取用七壯灸安然腕骨手外側腕前取骨下穴取陷中平五分針無價雜病穴道百會在頂中兩耳尖端上頂心是正穴二分沿皮向風池在耳後髮際陷中透橫針右邊左側刺左透右地倉口角旁針縫穴道處針入二分可灸之加艾炷人中生鼻下穴取五分平噙水亞珠現五分穴內明睛明目內眥折分才半是雀目冷淚流停針行妙計承漿在下唇點穴要分明宛中針半寸手法一般同頰車面推下頰骨陷中遷沿皮向下取直透地倉邊風府在頂後髮際一寸邊淺刺一分可深刺禁相妨迎香鼻上旁嫩骨五分藏平針一分可禁灸在其方翳風在耳後開口得其穴虛實行補瀉寸半忖量折神庭在頭額髮際五分得折取要分明五分針得穴太陽在眉後穴道紫筋邊稜邊刺出血目痛即時痊聽會耳珠前陷中關下邊動脈宛內取七分刺無偏膻中兩乳間仰臥在中央穴上只宜灸禁針要度量攢竹眉兩間沿皮向外邊寸半透魚腰眼腫即時痊絕骨外踝上端取三寸放橫針寸五分直透陰交上曲骨橫骨上穴道毛際中寸半施針灸手法內相攻呂細足內踝骨上動脈尋一寸量取入橫針透崑崙風市膝外筋垂手順腿指指盡點其穴一寸針方許血海足膝臏內廉肉際分垂手中指前橫針三寸應膏肓在四椎微下兩旁邊各開三寸點多灸禁針砭百勞大椎骨尖上刺三分五勞七傷病艾灸又加焚至陽取七椎骨尖上面持三分針入穴灸火助相陪肺俞三椎盡旁開半寸應一分以沿皮針去半寸用脾俞十一椎兩旁半寸開沿皮向外針一寸五分段白環廿一椎各開半寸為針加寸半使艾火正相宜腎俞十四椎寸半各開除沿皮向外針寸半要依隨命門十四椎節下齊相對伏臥是精宮三分針要會心俞第五椎節下兩旁移各開寸五分沿皮寸半齊脾俞十一椎骨下兩旁陪各開寸五分向外寸半回中脘臍上取四寸點穴針加艾五七壯寸半次相回乳根兩乳上一寸六分中沿皮向後取寸半手法通氣海臍下是寸半點穴真二寸半深取後灸要先針中極臍四寸針入寸五分艾加五七炷治證有神力丹田在於臍下取三寸宜直透二寸半艾灸效痊除上脘臍上取五寸上面存針行至一寸手法效前人關元臍下點三寸是根源三寸深針可艾火燒自然肝俞第九椎各開寸五分沿皮向外取又取寸半針肩井在肩端按肩三指端直針二寸半燒灸得安然璇璣天突下一寸要分明仰頭足之的針取五分乎期門在魚腹上越筋開屬股內脈應手禁針灸效速歸來臍三寸旁開三寸分下取二寸是針入半寸中膝關犢鼻下二寸陷中針可灸五七壯折取一寸深治多年醫不可痔瘡灸法用草一根男左女右腳從腳根量至腳尖周遭又用雙摺草從尾尖骨至腰中心灸七壯又用草一根從口兩角至耳根厚雙此至周圍一匝又從鼻尖雙此至頂心灸七壯立效
