body:
  text: 敘針灸之法捷於用藥夫人而知之矣於醫乎針灸大全針灸大成遍行於世而不知其皆本於瓊瑤乎瓊瑤一書備註三百六十餘穴其神針手法深明乎腹部盤盤搓循逆順之法所謂刮戰搖按攝彈搓搜者無不明白分曉令醫者一目瞭然先明乎此然後習氣上升陽氣下升陰熱中取涼涼中取熱溫多取冷冷多取溫及左補右瀉穴道遠近呼吸度數淺深分寸可次第而降矣吾願世之醫病者取此書而立復之按針中浮沉遲數之法斟酌左病取右右病取左病上取下病下取上之妙而消息之庶不失活人之志云爾是所望於世之行針者是為序時維道光丙申桃月下浣吉旦古扐吉詹景炎氏八十二歲燈下書
