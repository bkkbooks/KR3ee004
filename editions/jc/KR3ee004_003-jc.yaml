一皮蒸肉生雞粟起是皮蒸二十二氣蒸遍身壯熱不自安息用針尺寸取穴法凡孔穴尺寸皆隨人身形大小須分男左女右量手指中心一節兩橫紋中心為一寸此為周身尺也艾灸大小法凡艾炷須令腳跟足三分若不足恐覆孔穴不閉穴中經脈大氣不行即不能抽邪氣引正氣雖小兒必以中指取為準取艾法端午日日未出於艾中以意求其似人者輒指之以灸殊有效幼時見一書中雲爾忘其何書也艾未有真人也於明昧間苟以意命之萬法皆妄無一真者此可疑也用火法黃帝曰松柏棗榆柳柿竹等木用火灸必害肌血慎不可用凡取火宜嗃石取或水晶鏡子於日中得其太陽火為天陰以槐木取火亦良孫子中增添三法緣舊方無瀉火之法今考凡灸必須瀉火若不瀉火恐傷其頭目先灸當脊骨兩旁橫平上下四穴待灸瘡發半月餘日又灸當脊骨中豎上下兩穴五日或七日之後卻於三里兩穴灸五壯或七壯或針入寸半宜瀉不宜補舊圖十一個欠少婦女纏腳短小者非自然也比量必不真誠恐穴道參差徒受痛楚跣足裸體亦不方便今增添婦女一圖於後移於右手肩俞穴點定𨥤引線向下至中拇指端肉盡處不量指甲截斷以代量之方足用又參詳十二上下小兒頭足短者若量足付之於頭則不真也只可灸向下四穴可也十二穴一月之中上十日蟲頭向上從心至頭遊四穴中十日頭內向從心至膝遊四穴下十日蟲頭向下從臍至足遊四穴若投符用藥可知如紫蠶苗在汗中蓋蟲性已通靈切在精審其或取蟲不補即學淺妄行徒費貲終無去病之理不亦可悲也哉師曰治傳屍勞者先須知正氣與毒氣並行故臟腑有疑即成蟲壯陽日長雄陰日長雌其食先臟腑脂膏故其色白五臟六腑已經食損即皮聚毛脫婦人即月事不通血脈皆損不能榮於五臟六腑也七十日後食血氣肉盡故其蟲黃赤損於肌肉故變瘦劣飲食不能膚筋緩不能收持一百二十日外肉血盡故其蟲紫即食精髓傳於腎中食精故其蟲色黑食髓即骨痿不能起於床枕諸蟲久即生毛毛色雜花鍾孕五臟五行之氣傳之三人即能自飛其狀如禽多異品類傳入腎經不可救治法之所載者能徙利後其色白可三十日後服補藥其蟲頭赤者食患人肉可治頭口白者食患人髓其病難治只宜斷後故經曰六十日者十得七八其人八十日治者十得三四人過此以往未知全生但可為孫子除害耳今以六代所傳蟲狀病證一一詳著於後治勞取蟲經驗天靈蓋散天靈蓋兩指大以檀香煎湯過用酥塗炙咒七遍云雷公神電母聖逢傳勞便須定急急如律令檳榔如雞子五個為末阿魏二分細研麝香三分另研辰砂一分另研連珠甘遂二分為末一本用此味安息香三分銅刀子切入缽內研同諸藥拌和勻上六味研細末和令勻每服三大銅錢同後湯使下薤白三七莖青蒿二握甘草二莖五寸許蔥白二七莖桃枝以下並用白東南嫩者柳枝桑白一云桑枝酸石榴根一云枝各二握七寸許上八味須選潔淨處採用童子小便四升於銀石器內文武火煎至一升濾去渣分作三盞將煎藥末調下五更初服男患女煎女患男煎服後如覺欲吐即用白梅肉止之五更盡覺臟腑鳴須轉下蟲及惡物黃水異糞異物若一服未下如人行五六里又進一服至天明時更進一服並溫服如瀉不止用龍骨黃連等分為末熟水調下五錢次吃白梅粥補之取下惡物並蟲以盆盛之其蟲或似蜣螂蛇虺或如蜈蚣蜘蛛蚯蚓之狀急如油火並穢物並燒殺之其身所著衣服薦褥盡易燒之食蔥粥將近住服後主療數日後夜夢人哭泣相別是其驗也如取下得蟲看其口或青赤黃色可治如黑白色乃食人精髓不可療也雖不可療亦絕後患又合此藥時卻不得令病人聞其氣息恐蟲聞氣雖取下並煎時亦不得令聞知合藥亦不得在病家修合藥法凡修合藥時先須齋戒心志焚香淨掃一室不得令雞犬貓孝子婦人一切穢濁之物來見然後驗補肝臟勞金明散人參知母茯苓秦艽丁香甘草炙石膏煅各等分上件為末每服二錢用水一盞蔥白三寸同煎至八分通口服補心臟勞極守靈散白茯苓丁香訶子各一兩桔梗芍藥羌活甘草炙各一分上件為細末每服二錢用水一盞入耳環一雙蔥白三寸同煎至八分通口服補脾臟勞極魂停散白藥子桔梗人參訶子皮茯苓甘草炙丁香各一錢上件為細末每服二錢用水盞入蜜一匙同煎至八分通口服補肺臟勞極虛成散枳實去穰麩炒秦艽去蘆白茯苓芍藥麻黃去節元明粉當歸洗淨茴香炒各半兩甘草灸一錢上件為細末每服二錢用水一盞姜七片蔥白同煎至七分空心服一捻金九宮尻神坤一歲震二巽三申四乾五兌六艮七離八坎九零九不用五乾宮背面耳須知九坎腳尻踝肘肚皮七艮項腰問忌針刺二震居牙腨不須疑三巽頭耳乳並鼻口八膝脅離宮皆要知一坤胯不疑體見穴六兌還膊手轉難醫四中宮勞骨與肩尾此是尻神決定知三十日人神截法一足大指鼻柱手小指二外踝髮際與初同三股內牙齒右及足四腰胃脘手陽明五口陽明足遍身六手腦中又在胸七踝氣衝流在膝八腕股內及陰經九尻在足膝脛取十腰內踝足趺中九部人神不宜針灸一歲臍心肘輪流到咽口頭脊次第輪膝足轃成九十二部人神不宜針灸心喉頭肩背腰腹項足膝陰股次第排輪迴十二周
