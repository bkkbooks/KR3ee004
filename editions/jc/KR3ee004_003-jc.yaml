body:
  text: 卷三瓊瑤神書人部男女針法虛提答問一法問曰何為虛提合提不提何也答曰補三次循三次不虛不實方可伸提問曰氣血相停何為半提答曰補七次循十次病人血氣虛方可用半提輕輕不傷榮衛若用金針伸提令人病者昏運不可針傷榮衛也男女針法實提答問二法問曰實提不動氣不上下行何也答曰邪氣流於經絡皮肉澀滯令人帶痛矣問曰邪氣然何得出答曰搜者上搜下搜數十次微瀉三分邪氣出正氣歸於經絡也用氣上氣下也男女針法虛按答問三法問曰何為虛按答曰虛者多用按搓按者有分寸三十歲人滿按四十歲留二分五十歲人留五分或四十五十歲人虛者不用按滿滿則使邪在內正氣出令人魂命不在身男子少按按多血出女子多按按多補陰也男女針法實按答問四法問曰何為實按答曰使氣已了方可用按為實按又曰針緊用搓捻拈循即松不按使邪氣不出針松用循多按多買至氣微加戰方可不逆陰陽也男女針法虛彈答問五法問曰何為虛彈答曰虛者不用彈實者要取血用彈彈則傷血氣五臟榮衛也男女針法實彈答問六法問曰何為實彈答曰氣已至不行方可用彈氣即行問曰取血彈如何又答曰不敢氣行補三次七次彈七次按七次又彈七次出血有準也男女針法虛撞答問七法問曰如何虛撞答曰氣血行了復用要熱將針伸提三分出加重搓數次陽出熱微汗自來虛用搓不用刮不瀉不退可為良醫也男女針法實撞答問八法問曰何為實撞答曰在內緊澀痛者使金針不能動用搜十次彈七次瀉三次刮數十次其針自松也男女針法虛捻答問九法問曰何為虛捻答曰虛即補實即瀉循十次氣不來緊澀方用搓捻五七次氣再不來者至死不活也男女針法實捻答問十法問曰何為實捻答曰實則不用捻若捻氣愈猛傷榮衛也男女針法戰法答問十一法問曰何為戰答曰用氣上氣下不用戰血氣不勻用彈若戰氣行如蟻奔走方見或浮或沉或緊或澀是也男女針法刮法答問十二法問曰何為刮答曰使氣上氣下用刮恐有邪在皮膚之內邪氣因正氣相行此病不除者針有緊痛多用刮提皮不起多用刮風氣在內多用刮口眼喎斜多用刮也常時刮也男女針法加進答問十三法問曰何為進答曰氣來加進毫針有三寸針入二寸留一寸氣來足了若病者虛再加進一寸共進三寸方可停呼數度也男女針法加退答問十四法問曰何為加退答曰進三分血來即退五分氣分加進血來加退也男女針法順逆答問十五法問曰何為順逆搖答曰若使氣已畢方可用順逆搖不可使令病人氣血走亂有不使吐法等閒不可用順逆搖氣走錯亂經絡令人昏暈不甦醒也男女針法橫逆答問十六法問曰何為橫逆搖答曰使氣已盡又若使橫逆搖錯亂氣血經絡令人昏悶不知人事者若用吐法方可用橫逆搖也等閒不可用橫順逆搖若使錯亂經絡不甦醒者人必死也無救男女針法盤盤法答問十七法問曰盤者何為盤答曰男子先循買氣至方可伸提若使伸提見針上將皮吸起或一分或二分正氣相停方可用盤盤二者順搖三者加提三將針向左右盤加七攝用氣流行搓搓再加三提七攝此氣行數度畢有準男女心腎水火不濟病證十八法腎屬水病主生門有病尫羸氣也昏肩足耳鳴腮黑瘦次之邪妄立逃奔男女心腎水火不濟病證十九法心源煩躁急須呵此法通神更莫過喉內口瘡並熱病依之目下便安和瓊瑤講論五臟答問一取東方甲乙木講論答問二十法一取東方甲乙木病者其色青主虛作酸其腎者肝之母也肝者得虛者主腹痛眼流冷淚宜取盤搖所行行者三七也主腹痛五臟得疾用響者逆也順則針肝俞者多用提刮治冷淚等證此乃順行盤也搖者逆也不順不須巧言註解也二取南方丙丁火講論答問二十一法二取南方丙丁之火其色赤主虛口苦其髒心心主血火曰炎上血走住為心傷氣肺主人咳嗽此乃肺生紫色紫泡紫泡破者咳嗽吐血主面黃面赤吐痰者主肺氣不能和血但吐痰血有腰痛者腎虛即死二年至十二年而死葉血者春夏而死不治又有心傷五臟痛者冬吐血而遇夏季日死春季吐血而遇秋季日死夏季吐血而遇冬季日死宜取搖搖盤盤之理不須註解也三取西方庚辛金講論答問二十二法三取西方庚辛金行者其色白其臟肺主氣從作血心血走至肺紫泡紫泡破者吐血不已灸腎俞二穴三里二穴凡腹內不可灸用盤搖之理若盤盤法多者不可亂盤使五臟氣亂也但凡有病輕取輕盤務在伸提而響矣四取北方壬癸水講論答問二十三法四取北方壬癸之水其色黑其臟腎主於骨關下思咸肺乃腎之母不問男女先灸腹內宜用盤搖養腎水為本也五取中央戊己土講論答問二十四法五取中央戊己土其色於腹部丹穴中央之土為本其臟脾主內王日緣作盤三初多用提上循補搖提多憑補不用瀉內享七七莫妄施肝心脾肺分配四時針刺已見圖脾土於四季木旺一十八日見坤土土生化一十一臟受胃之東乃能生化腹中盤搖乃能化寒熱冷氣分於各臟化為十一臟若寒痛左盤七七熱痛止右盤七七提搖冷氣痛先提左盤盤凡腹內用響七提三補五搖寒提熱右響此是冷氣痛提則止左內庭下即效一取氣上之法講論答問二十五法一取氣上之法補三次即提七次將針向上是為循問曰何為血行氣行答曰氣行者麻血行者痛也問曰氣上何以氣血調勻答曰上刮七次又戰七次氣血相停不傷榮衛不知氣血相停如無目之人也二取氣下之法講論答問二十六法二取氣下之法瀉四次即按七次將針向下循問曰血痛血行氣麻氣行者依前一理氣下者何以氣血調勻答曰下刮七次戰七次相通知道氣下者又不知冷熱汗出者此乃不為良醫三取攝之法講論答問二十七法三取攝之法何為攝答曰在有病將針頭再提用七七貫穿經絡方謂之搜補瀉提按等不使搜病者不能除所以見血氣上下皆行也四取捫者講論答問二十八法四取捫者何為捫答曰用氣上氣下之法捫關關開者瀉也關者補也取血多用補取氣多用開五取彈努之法講論答問二十九法五取彈努之法何也答曰取血者先彈七七下即補三四次若是不止將糊針眼上三寸醫人親手打乞三下此血即止六取進退之法講論答問三十法六取進退之法何也答曰血來加進氣來加退進者主病人發熱退者虛汗有冷邪氣出正氣歸於外絡也七取撞搓之法講論答問三十一法答曰皮熱不來者補提勿轉太緊太緊者搖搖十四下病者渾身大熱方可左右取血為妙八取捻之法講論答問三十二法八取捻之法何也答曰主病人不知人事方可用捻捻者三也是三才也病者血氣不來上捻不來者死不治也手足陽明答問三十三法手足三陽三陰表裡引經循攝氣上氣下答曰手法者在手心傳口授秘法六陰六陽本經秘法訣三十四法太陽經足膀胱手小腸上下循下後補少陽經足膽手三焦上下循下後補刮少陰經足腎手心下後刮戰厥陰經足肝手包絡上下循下後補陽明經足胃手大腸上先提循下後瀉太陰經足脾手肺上補下後循提陰陽配合講論三十五法天有陰陽風寒暑濕燥火三陰三陽下應之溫涼寒熱四時氣候溫涼是也溫熱者天之陽也寒涼者天之陰也此乃天之陰陽也地有陰陽金木水火土生長化收藏下應之辛甘酸苦鹹五味是也辛甘淡也地之陽也鹹酸苦者地之陰也此乃地之陰陽也陰中有陽平旦至日中天之陽也陽中之陽也陽中有陰日中至黃昏天之陰陰中之陰也人身之陰陽故人亦應之人身之陰陽外為陽內為陰背為陽腹為陰臟為陰腑為陽心肝脾肺腎五臟為陰膽與胃大腸小腸膀胱三焦六腑為陽所以知陰中之陰陽中之陽也陰陽者何也如冬病在陰夏病在陽春病在陰秋病在陽知其所則施針循氣上氣下也背為陽陽中之陽心也背為陽陽中之陰肺也腹為陰陰中之陽肝也腹為陰陰中之陰脾也四時作用氣上氣下秘法講論三十六法不問所感病證或溫或涼或熱或寒如春時有病先取氣上後取氣下夏月有病先取氣下後取氣上秋月有病先取氣下後多用戰補冬月有病多補三六九數後取氣自然行以是不絕生化之源也瓊瑤大師治小兒深得此理講論三十七法內經曰必先遂其氣而無伐天和是為至治又曰違時伐氣又曰無伐生之氣此皆常道用針春復秋冬循環之法若反其常則陰陽氣上氣下不可亂矣十二經絡捷法人身造化講論三十八法凡刺之理經絡為始經絡者能決死生處有病調虛實不可不通也夫經者內干五臟而外絡支節其浮氣不循經者為衛氣精專於經隧者為榮氣陰陽相隨內外相實如環之無端常以平旦為紀其脈始從中焦手太陰出於手陽明上行注足陽明下行至跗上去大指間與太陰相合上行抵脾注心心注手少陰出腋下臂次上巔下注小指合手太陽循脊下至尻下行注小指之端循足心注少陰上行腎注心外散於胸中循於心主脈注腋下臂入兩筋之間入掌中出中指之端還注小指次指之端合手少陽上行膻中散於三焦注膽出脅注足少陽下行至跗上復從跗注大指間合足厥陰上注至肝注肺復出手太陰此榮氣之行也逆順之常榮衛之行常循其經周身之度一十六丈二尺一日夜行八百十一丈計五十度周身於衛氣則下循其經焉晝則行陽夜則行陰行陽者行諸經行陰者行諸臟凡刺之道榮衛所在至後用氣上氣下開通經絡十二經絡所屬出經陰陽相生配合三十九法手太陰辛肺脈起於中焦出於大指之端注大腸經手陽明庚大腸脈起大指之端入挾於鼻孔注胃經足陽明戊胃脈起於鼻交之大指出其端注脾經足太陰己脾脈起於大指之端注於心中注心經手少陰丁心脈起於心中注入掌中循小指注小腸經手太陽丙小腸脈起於小指橫絡於耳注膀胱經足太陽壬膀胱起於目內至小指次指出其端注三焦經足少陰癸腎脈起於小指下注胸中注心包絡經手厥陰癸心包脈起於胸中小指次指出其端注三焦經手少陽壬三焦起於小指端至目銳眥注膽經足少陽甲膽脈起於目銳眥入大指歧骨出於端注肝經足厥陰乙肝脈起於大指聚毛之際上注肺經十二經絡配合四十法十二經絡手足三陰三陽表裡支幹配合系晝夜百刻十二時定體之也手太陰肺經配合四十一法手太陰肺經配於陽明大腸經相為表裡立手為上太陰五穴為陰穴大指外側邊起少商二穴並見在前治喉嚨閉塞纏喉風等證魚際二穴治五心煩熱咳嗽等證太淵二穴治牙痛胸滿之證經渠二穴治五心煩熱諸虛不足腕疼等證列缺二穴尺澤二穴治筋緊急腰脊脅肋間疼肺經屬金在支為寅在干為辛手陽明大腸經六穴配合四十二法手陽明大腸六穴為陽穴從大指側邊起商陽二穴治氣喘咳嗽眼目內障等證二間二穴治眼疼痛等證三間二穴治喉閉等證瀉之合谷二穴治口眼喎斜傷寒等證陽谿二穴治兩手腕疼不能搖物無力補之灸七壯三里二穴治兩臂膊不遂無力牙疼等證曲池二穴治四肢癱瘓半身不遂傷寒熱病瀉之大腸經屬金在支為卯在干為寅手厥陰心包絡經配合四十三法手厥陰心包絡經配合手少陽三焦經相為表裡立手中五穴為中陰穴從中指起中衝二穴治心腹痛手掌發熱昏悶不省決人生死勞宮二穴大陵二穴治心胸氣疼渾身發熱等證內關二穴治心腹脹滿食物不化等證間使二穴治寒熱瘧疾熱多瀉之寒多補之曲澤二穴治心氣不足心包絡屬火在支為戌在干為癸手少陽三焦經配合四十四法手少陽三焦經六穴為陽從小指之端起此謂陰陽表支幹配合也液門二穴中衝二穴治脊疼手臂陽池二穴治手腕疼痛搖無力外關二穴治腹內疼痛背疼無力支溝二穴治傷寒脅肋疼大小便閉塞氣不能通瀉之天井二穴治瘰癘證針一寸灸七壯三焦經屬火在支為亥在干為壬手少陰心經配合四十五法手少陰心經配手太陽小腸經相為表裡立手為下五穴為陰穴晚小指側角起少衝二穴治熱病心腹脹痛寒熱往來傷寒未解少府二穴治手掌中發熱等證神門二穴治心癡呆五癇等證通里二穴治心中恐悸不能言語掌中發熱少海二穴治頭項不能回顧等證少陰心經屬火在支為午在干為丁手太陽小腸經配合四十六法手太陽小腸經五穴為陽穴從小指端起之少澤二穴治乳癰產母無乳先瀉後補提前谷二穴治熱病汗不出咳嗽血不止後谿二穴治癇疸癲狂瘧疾腕骨二穴治渾身發熱五癇等證少海二穴同上手太陽小腸經屬火在支為辰在干為丙足厥陰肝經配合四十七法足厥陰肝經五穴為陰從足次指側起大敦二穴行間二穴治心腹脹滿眼目紅腫腳背虛浮能消水氣肝家怒氣太衝二穴治心中恍惚癲邪之證腳背紅腫行步艱難之證膝關二穴治膝眼紅腫脾家受濕腳軟無力曲泉二穴治腳腿疼痛寒濕風痹足厥陰肝經屬木在支為亥在干為乙足少陽膽經配合四十八法足少陽膽經六穴為陽穴起於足次指竅陰二穴治四肢厥冷肚腹疼痛不止俠谿二穴臨泣二穴丘墟二穴懸鐘二穴透三陰交二穴陽輔二穴陽陵泉二穴足少陽膽經屬木在支為子在干為甲足太陰脾經配合四十九法足太陰脾經配足陽明胃經相為表裡八穴從大指側起隱白二穴治腹脹不得睡臥嘔吐反胃不止不下食大都二穴治手足厥冷五心煩熱不思飲食灸七壯太白二穴治身腿疼無力公孫二穴治腳背紅腫昏迷不省人事瀉之商丘二穴治紅腫干側腳氣風三陰交二穴治男子小腸疝氣婦人難產情色所感陰陵泉二穴治腹中寒不嗜食小便不利閉結等證血海二穴治兩腿外廉血風瘡足太陰脾經屬土在支為已在干為己足陽明胃經配合五十法足陽明胃經八穴為陽穴內庭二穴治四肢厥冷大小腹脹酒食所傷瀉之厲兌二穴治小腹膨脹寒熱進退等證陷骨二穴治眼目浮腫食腫水腫氣灸七壯衝陽二穴治口眼喎斜腳背紅腫氣聚不散解谿二穴治偏正頭風之證豐隆二穴治逆胸膈疼痛步艱難三里二穴治五勞七傷諸虛百端等證陰市二穴治腿冷膝痛而不得屈伸麻木不仁足陽明胃經屬土在支為辰在干為戊足少陰腎經配合五十一法足少陰腎經配足太陽膀胱相為表裡五穴為陰穴從足心中起湧泉二穴治大小便閉結心中發熱五癇等證然骨二穴治喉嚨痛足跗紅腫不得步履太谿二穴治心牙疼腳氣紅腫即呂細穴灸七壯照海二穴內踝上三寸治喉嚨痛大便閉結熱淋等證復溜二穴治虛汗補之即愈陰谷二穴治小便不通婦人胞胎之證足少陰腎經屬水在支為酉在干為癸足太陽膀胱經配合五十二法足太陽膀胱經七穴為陽穴至陰二穴治眼目紅腫疼痛通谷二穴治腳浮腫束骨二穴治腰痛不得屈伸腳氣虛腫京骨二穴治久瘧不痊腰背腿疼俯仰不得崑崙二穴治腰腳疼痛氣脈不和承山二穴治轉筋腰腿筋急寒濕腳氣不能行步委中二穴治一切腰腿腳疾等證足太陽膀胱經屬水在支為申在干為壬此之謂陰陽表裡支幹配合也黃帝之機瓊瑤之論五十三法蓋諸經中者玄者最玄妙者最妙雖為醫儒九流聖哲之人高唱越人得死還生推針破腸瀉心華佗刮骨療毒李中孝察色聽聲王叔和專診其脈張仲景調理四時傷寒秋夫療鬼王纂針腰孫真人作下千金之方伊尹作濟生之術人有四百四病藥有八百八般各有以源道內有六陳十八反有炮爁炙煉分兩君臣皆由手呼吸全憑針灸補瀉之法針有揭山之方藥有神效之功夫針者修教神通古法通三才之妙如神起死回生神農黃帝扁鵲知恩劉高祖有德之君夫軒轅黃帝道人全憑針灸補瀉之功戊年年戊午月戊午日戊午時其年赤馬口中銜鐵端坐十二條針第一條針名曰青龍針也長一尺二寸按一年十二月也第二條針名曰白虎針也長九寸按金木水火土太陰月孛羅計九星也第三條針名曰喪門針也長八寸按乾坎艮震巽離坤兌八卦也這三條針世間多有不會此針乃神仙所用也這針針山山崩針地地裂針海水逆流針人枯骨還更生周文王因此禁了這三條針也後留九針在世間與人使用一鑱針平半寸長一寸六分其頭大末銳其病熱在頭身宜此二員針其身圓鋒如卵形長一寸六分肉分氣滿宜此三鍉針鋒如黍粟之銳長三寸五分脈氣虛少宜此四鋒針兩三隅長一寸六分瀉熱出血發泄痼病宜此五䤵針一名破針末如劍鋒廣二寸半長四寸破癰腫出膿血六員利針尖如毫且員且利中身微大長一寸六分調陰陽去暴癖七毫針法象毫尖如蚊虻喙長三寸六分調經絡去疾病八長針鋒加利長七寸痹深居骨解腰脊奏之間者九燔針一名焠針長四寸風虛合於骨解皮膚之間者這九針上按著五星下按著四時五星者金木水火土是也四時者春夏秋冬是也這針又按著皮肉脈筋五音陰陽齒風竅九針也這針各有攻病之能一鑱針破頭風面部風痛二員針開內外療病眼疾三鍉針經絡引氣四鋒針破瘤開癰五喙針療咽喉腫痛六員利針治頭風眼疾七毫針調陰補陽八長針療筋骨疼痛九燔針補男子女人下元虛冷這針有千般補瀉手指補瀉提按補瀉左右補瀉陰陽補瀉針頭補瀉虛實補瀉呼吸補瀉氣上補瀉氣下補瀉虛循補瀉實循補瀉虛提補瀉實提補瀉虛按補瀉實按補瀉虛彈補瀉實彈補瀉虛扌仝補瀉實扌仝補瀉虛捻補瀉實捻補瀉加進補瀉加退補瀉順搖補瀉橫搖補瀉刮戰補