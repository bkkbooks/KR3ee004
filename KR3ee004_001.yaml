body:
  text: 卷一瓊瑤神書天部宋徽宗皇帝崇寧五年瓊瑤真人一書手法序一論醫人針灸不識何經受病妄行取穴又不知伐上升陽之法又不知氣下升陰之法令患人病疾楚楚之苦不得愈者何也答曰一則不中穴不知氣行二則不知左補右瀉更不知其分寸三則不知氣下升陰之法難受其分四則雖知氣至不明氣上氣下或隨其針而萃者五則不知汗吐下三法六則又不知腹部盤盤針法專行補瀉令人氣血不散七則不知移疼注痛又不知熱中取涼涼中取熱溫多取冷冷多取溫又不知左癱而取右右癱而取左又不知上部有病而下部取下部有病而上部取也八則不明針中浮沉遲數緊澀不知病者何生又不知補生瀉成之息數左補右瀉何能治之先須審其八般手法治之明其刺禁辨經絡穴道遠近各人呼吸度數淺深分寸用之無不愈矣不可補瀉而取出針又不可一律而推之務在調勻家明其真師口訣手法祕要親傳不得錯矣瓊瑤真人用升陽升陰氣上氣下之手法講論歌二太陽膀胱及小腸升陽氣上三經當胃經陽明二證取氣下熱甚按前行少陽膽與三焦證氣上氣下分陰陽太陰脾胃實調氣多取升陽效非常少陰心腎搓摩法更須取下要升陽厥陰升陽為上用四逆搓搓要熱強若是老師行此法免使患者受其殃瓊瑤標本運氣歌三少陽從本為相火太陰從本濕上坐厥陰從中火是家陽明從中濕是我太陽少陰標本從陰陽二氣相包裹風從火斷汗之宜燥與濕兼下之可萬病能將火濕分徹開軒岐無縫鑽瓊瑤辨十二經水火分治法四膽與三焦尋火治肝與包絡都無異脾肺常將濕處求胃與大腸同濕治惡寒表熱小腸濕惡熱表寒心腎熾十二經中最端的四經屬火四經濕四經有熱有寒時攻裡解表細消息濕同寒兮火同熱寒熱到頭無兩說六經分來分熱寒寒熱中停真浪舌休治風時休治燥治得火時風燥了當解表時休攻裡當攻裡時莫解表表裡如或兩可攻後先內外分多少敢謝軒岐萬世恩爭奈醯雞笑天小宋徽宗崇寧皇帝論五朕自今日早朝會集文武公卿宣問大臣自從寡人即位以來聞得在京人死大半莫不是寡人無德致得萬民有愆班中有一大臣出班奏曰陛下為今時人死因今時之醫醫人多死皇帝龍顏不悅又云寡人曾聞先皇帝太宗立醫人為長命斯為貴而今時之醫醫人多死故大臣端簡再奏陛下為甚今時之醫學不從師針不按穴藥不依方虛而不補實而不瀉針能主表藥能主裡針藥並行方可為醫倚功全濟凡醫人一要識字二要曉陰陽三通運氣謂之明醫醫不識字不曉陰陽不通陰陽謂之盲醫藥不別認新陳亦不知反誤治男子如治婦人治婦人如治小兒醫不三世不服其藥更兼世人有藥預先不肯求醫及致病根源深方才出手求醫倘又不遇良醫病家不捨資財醫家堅執古方或云出於遠方而難求索人命已失永無再生之理所謂差之毫釐謬以千里不誠然奏奉聖旨天下尋訪明醫欽選擢官前查欽奉太祖高皇帝聖旨差令御史申貴前往虎口龍潭洞訪見瓊瑤真人神書三卷令侍郎張忠學習神書三卷千金不傳聖旨若有軍民曾習瓊瑤真人氣上氣下盤盤針法者許令太醫院免其本家差役二丁免習銅人聖旨差令丞相同太醫院官考注三百六十餘穴又差尚書況青同考氣上氣下手指之法聖旨又令都御史楊林給事中同考神針手法不許循私務在精選聖旨差令主事劉斌同考汗吐下三法既明以憑擢用聖旨差令丞相胡智兼太醫院考腹盤盤搓循逆順法聖旨差令太醫院官劉瑢同考刮戰提按合同四法精通聖旨差令太醫院官黃侍郎張忠同考攝彈搓搜合宜四法華蓋殿門外左都御史劉子和欽奉聖旨即說於太師劉大本遵守瓊瑤心傳口授祕法神言不得循私妄傳於世以備擢用論手足陰陽流注篇六凡人兩手兩足各有三陰脈三陽脈以合為十二經也三陰為太陰少陰厥陰三陽為太陽陽明少陽也人兩手足各有三陰三陽脈相合為十二經也謂之經者以氣血流行經常不息而言謂之脈者以血理分袞行體而言也手之三陰從臟走至手手之三陽從手走至頭足之三陽從頭下走至足足之三陰從足上走至腹手三陰從臟走至手謂手太陰起中焦至出大指之端手少陰起心中至出小指之端手厥陰起胸中至出中指之端三陽從手走至頭謂手陽明起大指次指之端至上挾鼻孔手太陽起小指之端至目內眥手少陽起小指次指之端至目鋭眥足三陰從足走入腹謂足太陰起大指之端至屬脾絡胃足少陰起足心至屬腎絡膀胱足厥陰起大指聚毛至屬肝絡膽足三陰雖曰從足入腹然太陰乃復上膈挾咽散舌本下少陰乃復從腎上挾舌本厥陰乃復上出額與督脈會於巔蓋手太陰從肺系橫出腋下手少陰從心系上肺出腋下手厥陰循脅上抵腋下此秦越人所謂諸陰脈皆至頸胸而還者也而厥陰則又上出於巔蓋厥陰陰之盡也所以然者示陰無可盡之理亦從易之碩果不食示陽無可盡之理義也然易之陰陽以氣言人身之陰陽以臟象言言氣則無形而臟象有質氣陽而質陰也然則無形者貴乎陽有質者貴乎陰歟絡脈傳注周流不息七絡脈本經之旁支而別出以聯絡於十二經者也本經之脈由絡脈而交他脈他脈之交亦由是焉傳注周流無有定息也是以手太陰之支者從腕後出次指之端而交於手陽明手陽明之支者從缺盆上挾口鼻而交於足陽明足陽明之支者別跗上出大指之端而交於足太陰足太陰之支從胃別上膈注心中而交於手少陰手少陰則直自本經少衝穴而交於手太陽不假支援蓋君者出令者也手太陽之支者別頰上至目內眥而交於足太陽足太陽之支者從膊內左右別下合膕中下至小指外側端而交於足少陰足少陰之支者從肺出注胸中而交於手厥陰手厥陰之支者從掌中循小指次指出其端而交於足少陽足少陽之支者從跗上入大指爪甲聚毛出而交於足厥陰足厥陰之支者從肝別貫膈上注肺而交於手太陰也故經脈者行血氣通陰陽以榮於身也通結上文以起下之義經脈之流行不息所以運行血氣流通陰陽以榮養於身者也不言脈絡者舉經以賅之其始從中焦注手太陰陽明陽明注足陽明太陰太陰注手少陰太陽太陽注足太陽少陰少陰注手心主少陽少陽注足少陽厥陰厥陰復還注太陰始於中焦注手太陰終於注足厥陰是經脈之行一周身也其氣常以平旦為紀以漏水下百刻晝夜流行與天同度終而復始者也氣榮氣統紀承上文經脈之行其始則自起中焦其氣別常以平旦為紀也榮常以平旦之寅時為紀由中焦而始注手太陰以次流行也不言血者氣行則血可知也漏水下百刻晝夜流行與天同度者言晝夜漏下百刻之內人身之經脈流行無有窮止與天同一運行也蓋天以三百六十五度四分度之一為一周天而終一晝夜人之榮衛則以五十度周為一身氣行一萬三千五百息脈行八百一十丈而終一晝夜適當明日之寅時而復會於手太陰是與天同度數周而復始也或云晝漏有長短其榮氣盈縮何如然漏刻雖有長短之殊而五十度周身者均至其中不因漏刻而盈縮也醫學源流八佚瓊瑤真人避瘟毒傳染法九凡醫家至人家看病恐有瘟疫潦勞傳染之疾其法凡人未至其病家先須浣口洗手望空祝白方至其家且要至誠立不中門坐不靠壁臥不解衣蓋被不可近口凡有飲食務自己氣吹過方可吃不對日月星辰下小遺亡起淫念休起貪心勿生嫉妒專要行方便心此是陰陽邪氣先不敢進矣凡接病家所謝之物務要先舉手叩齒謝天然後以左手接之如出門回家便在地下拾一葉或草絶做兩段分丟兩處至長流水邊浣口洗手望太陽默祝云至某家治病回得何物並無惹帶轉身便行不可回頭即無傳染矣瓊瑤真人針灸神針禮斗神咒十佚天是神咒十一佚後咒針法揉搓十二佚生成數十三生一加五補生瀉成男子左補右瀉女子右補左瀉水一火二木三金四土五易曰天一生水壬與子地六成之癸與亥腎應之水吹氣出於肺屬陰故寒地二生火丁與巳天七成之丙與午心應之火呵者賀也怨也天三生木甲與寅地八成之乙與卯肝應之木噓氣出丹田屬陽故溫地四生金辛與酉天九成之庚與申肺應之金呬鼻中出氣天五生土戊與辰地十成之己與未脾應之土呼外息也一呼一吸為一息又曰三焦相火取嘻此應五臟六腑呼吸出入門戶也嘻者噫嘻嗟也嘻聲恨也冷補之時使氣至病所更用生成之息故令病人鼻中吸氣天氣入口中出氣地氣出自覺熱矣熱瀉之時使氣至病所以更用生成之息數令病人鼻中氣法天氣出口中吸地氣入按所病在臟腑之數自覺清涼矣法曰補冷天先吸鼻中先吸氣口中出氣熱瀉地先行口內先吸氣鼻中出氣兩竅互換取天氣出地氣入地氣出天氣入生成至數推按病所臟腑虛實之數呼吸急提慢按逆吸氣慢提急按隨呼吸隨補迎瀉為呼吸此理呼吸至精微千金不傳之祕十四神針曰氣浮皮起多少不可上用升陽法如有浮無滑可提急彈數次可升陽氣滑針出多少可用升陽法有滑無浮先按提搓之戰出針氣澀捻針氣來又不來又來針上有黏皮出針在上氣沉針皮起有儅無儅此法用搓按氣緊補瀉提按刮搜俱緊可用升陽法氣細微氣細微中緊邊松可以又用氣上氣下來氣不來用一遭補瀉或來或不來用彈彈加搓攝氣兩邊行可按氣逆之伸提有力氣上下用搓數次按一次提搓次按一次提一次又搓數次戰按微補一次按定出針搓搓刮七次循三次戰提氣行按瀉得吸呼海底發火燒天急天邊水火就中溫輕輕撥動此而個卻似船家把舵執瓊瑤神針書定生死之法千金不傳十五人皮老硬屬木沉澀細微屬陽西方金也針滑氣不至屬太陰北方水也不緊不慢氣即至屬太陽南方火也氣實澀屬少陽東方木也皮硬肉稀氣微不至金能剋木也水能剋火必是死症也肉緊硬屬脾土乃五行相生也但有相剋便定生死余月日時大凶也皮浮肉緊氣即至重針寶休也女人皮肉俱緊必當雙産也即是男兒也皮浮肉緊定當單子也皮肉俱稀是女兒之形也瓊瑤真人祕傳神針手法心授口訣二十四字十六氣上左氣上右氣上中氣上上氣上下氣上虛實氣下左氣下右氣下中氣下上氣下下氣下虛實升陽左升陽右升陽中升陽上升陽下升陽虛實升陰左升陰右升陰中升陰上升陰下升陰虛實循循左循循右循循中循循上循循下循循虛實提提左提提右提提中提提上提提下提提虛實按按左按按右按按中按按上按按下按按虛實彈彈左彈彈右彈彈中彈彈上彈彈下彈彈虛實撞搓左撞搓右撞搓中撞搓上撞搓下撞搓虛實捻捻左捻捻右捻捻中捻捻上捻捻下捻捻虛實進進左進進右進進中進進上進進下進進虛實退退左退退右退退中退退上退退下退退虛實搜搜左搜搜右搜搜中搜搜上搜搜下搜搜虛實攝攝左攝攝右攝攝中攝攝上攝攝下攝攝虛實逆逆左逆逆右逆逆中逆逆上逆逆下逆逆虛實搖搖左搖搖右搖搖中搖搖上搖搖下搖搖虛實橫橫左橫橫右橫橫中橫橫上橫橫下橫橫虛實順順左順順右順順中順順上順順下順順虛實摩摩左摩摩右摩摩中摩摩上摩摩下摩摩虛實刮刮左刮刮右刮刮中刮刮上刮刮下刮刮虛實切切左切切右切切中切切上切切下切切虛實前前左前前右前前中前前上前前下前前虛實後後左後後右後後中後後上後後下後後虛實伸伸左伸伸右伸伸中伸伸上伸伸下伸伸虛實走走左走走右走走中走走上走走下走走虛實盤盤左盤盤右盤盤中盤盤上盤盤下