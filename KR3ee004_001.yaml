口吐傷寒發熱病六十四法傷寒發熱要汗法四關出內定吉凶熱多不解要出血四六多彈取血功取血停呼真奇妙後用關中要升陽升陽多取按提法傷寒熱病自消涼傷寒男子陰證十指青六十五法男子陰證十指青闌門雙盤取熱循丹田一穴圓盤取三穴停呼搓熱純再取三里升陽二闌門丹田盤攝勻任是疼痛無不止急用調汗出汗頻傷寒婦人十指冷口唇紫色六十六法婦人陰證十指冷中極闌門灸針寧二穴急搓圓盤法盤人陽和熱在蒸復上此穴升陽攝三里升陰在意精再用三里升陽法停呼內熱病安平傷寒氣上虛訣六十七法虛人不循補七次半提穴起向上行微刮七遭加搓戰戰用重按法針明傷寒氣上實訣六十八法補三次法提不起伸提用循刮戰功再取針來向上攝氣自流行病不攻傷寒不傳氣六十九法升陽二遭用氣上再用氣上要搓摩升起即用升陽法問病有熱停呼呵再取升陽一二次搖搖左轉七循多氣下即響升陽法連提戰按響聲和傷寒氣下加七十法搓搓氣上要升陽急用升陰氣下良再取升提搓復起停停脹滿自然康順搖彈搓復加戰氣上升陰提自張再使升提提不出升陰連下即安康傷寒小兒汗七十一法氣上一遭搓五次七補加搓三補齊要搓伸提陽在外循循無汗呼吸之傷寒小兒汗不出加七十二法搓搓數十有餘遭熱來加搓陽氣調伸提汗出左右攝諸經汗出病源消傷寒小兒吐七十三法手取順搖十一七氣上一次便橫陰循是搖搖真要吐再加攝按停呼冷傷寒小兒吐加七十四法氣下一次要橫逆錯亂循環用七遭再用氣上提戰法連吐七口見功高心風病七十五法勞宮二穴治心風提按加補彈數勻心胸大陵升陽法急取升陰提攝平三里微用氣上取連用搜刮指下明再用寸關攝下法調勻血氣出針寧中風不語七十六法中風不語刺心經四關四穴見浮沉次日湧泉如捻去肺經穴上魚際針針刺此穴聲音出三里升陽氣下尋太衝二穴取血出氣血通暢免勞心神不守舍心風旺說不定七十七法神不守舍刺心經內關包絡氣上循心經多取神門上三里照海下法存並取肝經太衝穴外關二穴氣上捫一七多灸心肝俞四穴提刮一理論
